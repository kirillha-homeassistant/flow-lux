<div class="tg-settings">
    <b>Настройка Telegram:</b><br>
    <input type="text" id="tg-token" placeholder="Bot Token" onchange="saveTg()">
    <input type="text" id="tg-id" placeholder="Your Chat ID" onchange="saveTg()">
    <button onclick="testTg()" style="padding: 5px 10px; cursor: pointer; background: var(--p); color: #fff; border: none; border-radius: 5px;">ПРОВЕРИТЬ ТГ</button>
    <br><small id="tg-status" style="color: gray;">Введите данные и нажмите проверить</small>
</div>

<script>
// Добавь эту функцию в конец скрипта
async function testTg() {
    const status = document.getElementById('tg-status');
    status.innerText = "Отправка...";
    status.style.color = "orange";
    
    try {
        await sendTg("💎 Проверка связи! Админка Flow Lux подключена успешно.");
        status.innerText = "✅ Сообщение ушло! Проверь Телеграм.";
        status.style.color = "green";
    } catch (e) {
        status.innerText = "❌ Ошибка! Проверь Token или ID.";
        status.style.color = "red";
    }
}

// Убедись, что функция sendTg выглядит так:
async function sendTg(text) {
    const token = document.getElementById('tg-token').value || localStorage.getItem('tg_token');
    const id = document.getElementById('tg-id').value || localStorage.getItem('tg_id');
    if (!token || !id) {
        alert("Сначала введи Token и ID!");
        return;
    }
    const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('TG Error');
}
</script>
