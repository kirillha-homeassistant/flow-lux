<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW LUX</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root { --p: #f472b6; --bg: #0f172a; --card: #1e293b; --tea: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding: 15px; min-height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: rgba(30,41,59,0.5); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); }
        h1 { font-size: 20px; color: var(--p); font-weight: 900; letter-spacing: -1px; }
        nav { display: flex; gap: 10px; }
        nav button { background: none; border: none; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        nav button.active { color: var(--p); text-shadow: 0 0 10px rgba(244,114,182,0.5); }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        input { background: #0f172a; border: 2px solid #334155; border-radius: 14px; padding: 14px; color: #fff; font-size: 18px; font-weight: 700; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); }
        .input-tea { border-color: rgba(16, 185, 129, 0.3); color: var(--tea); }
        .input-tea:focus { border-color: var(--tea); }
        
        .pay-btn { background: #334155; border: none; padding: 12px; border-radius: 14px; color: #94a3b8; font-weight: 800; font-size: 10px; text-transform: uppercase; transition: 0.3s; }
        .pay-btn.active { background: var(--p); color: #fff; box-shadow: 0 4px 15px rgba(244,114,182,0.4); }
        
        .main-btn { width: 100%; background: linear-gradient(135deg, #ec4899, #be185d); border: none; padding: 18px; border-radius: 16px; color: #fff; font-weight: 900; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 20px rgba(190,24,93,0.3); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { opacity: 0.5; }

        .item { background: rgba(30,41,59,0.4); padding: 12px 16px; border-radius: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #334155; }
        .item.cash { border-left-color: #10b981; }
        .item b { color: var(--p); }
        .item .tea-label { color: var(--tea); font-size: 10px; margin-left: 5px; font-weight: 900; }

        .log-btn { background: rgba(30,41,59,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 15px 10px; border-radius: 16px; color: #fff; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        
        .st-val { font-size: 26px; font-weight: 900; color: #10b981; margin-top: 5px; display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>FLOW LUX</h1>
        <nav>
            <button onclick="tab('in')" id="t-in" class="active">Касса</button>
            <button onclick="tab('lg')" id="t-lg">Точки</button>
            <button onclick="tab('st')" id="t-st">Отчет</button>
        </nav>
    </header>

    <main id="s-in">
        <div class="card">
            <div class="grid">
                <input type="number" id="qty" placeholder="Кол-во">
                <input type="number" id="price" oninput="upd()" placeholder="Сумма ₽">
            </div>
            <div style="margin-bottom: 15px;">
                <input type="number" id="tips" class="input-tea" placeholder="+ Чаевые ₽">
            </div>
            <div class="grid">
                <button onclick="setPay('card')" id="p-card" class="pay-btn active">КАРТА</button>
                <button onclick="setPay('cash')" id="p-cash" class="pay-btn">НАЛИЧКА</button>
            </div>
            <div id="cCalc" class="hidden" style="background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <input type="number" id="get" oninput="upd()" placeholder="Сдача с..." style="width:50%">
                <div style="text-align:right"><b id="change" style="color:var(--p);font-size:20px">0 ₽</b></div>
            </div>
            <button onclick="save()" id="btn-save" class="main-btn" disabled>Загрузка...</button>
        </div>
        <div id="list"></div>
    </main>

    <main id="s-lg" class="hidden">
        <div class="grid-3">
            <button onclick="logE('🚀 СТАРТ')" class="log-btn"><span>🚀</span>СТАРТ</button>
            <button onclick="logE('🛒 ЗАКУП')" class="log-btn"><span>🛒</span>ЗАКУП</button>
            <button onclick="logE('📦 СКЛАД')" class="log-btn"><span>📦</span>СКЛАД</button>
            <button onclick="logE('🅰️ ТОЧКА А')" class="log-btn"><span>🅰️</span>ТОЧКА А</button>
            <button onclick="logE('🅱️ ТОЧКА Б')" class="log-btn"><span>🅱️</span>ТОЧКА Б</button>
            <button onclick="logE('🏁 ФИНИШ')" class="log-btn"><span>🏁</span>ФИНИШ</button>
        </div>
        <div id="lList" style="margin-top:10px"></div>
    </main>

    <main id="s-st" class="hidden">
        <div class="grid">
            <div class="card" style="text-align:center;margin-bottom:0"><small style="color:#94a3b8">ШТУК</small><b class="st-val" id="stQ" style="color:#fff">0</b></div>
            <div class="card" style="text-align:center;margin-bottom:0"><small style="color:#94a3b8">В КАССЕ</small><b class="st-val" id="stM">0</b></div>
        </div>
        <div class="card" style="text-align:center; margin-top:10px">
            <small style="color:#94a3b8">ЧАЕВЫЕ (ОТДЕЛЬНО)</small>
            <b class="st-val" id="stT" style="color:var(--tea)">0 ₽</b>
        </div>
        <div style="margin-top:15px">
            <button onclick="exportExcel()" id="btn-excel" class="main-btn" style="background:#059669">💾 СКАЧАТЬ EXCEL</button>
        </div>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyAcZmlPf71oKnxyJQ8k2xhjJJXHtPrWktY",
            authDomain: "sales-flower-d7cb0.firebaseapp.com",
            projectId: "sales-flower-d7cb0",
            storageBucket: "sales-flower-d7cb0.firebasestorage.app",
            messagingSenderId: "611059680149",
            appId: "1:611059680149:web:a53f77fb73b6cf10242c9c"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        let payType = 'card';
        const saveBtn = document.getElementById('btn-save');

        db.collection("sales").limit(1).get().then(() => {
            saveBtn.disabled = false;
            saveBtn.innerText = "ЗАПИСАТЬ ПРОДАЖУ";
        });

        window.tab = (t) => {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('s-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('active');
        };

        window.setPay = (t) => {
            payType = t;
            document.getElementById('p-card').classList.toggle('active', t === 'card');
            document.getElementById('p-cash').classList.toggle('active', t === 'cash');
            document.getElementById('cCalc').classList.toggle('hidden', t !== 'cash');
        };

        window.upd = () => {
            const p = +document.getElementById('price').value || 0;
            const t = +document.getElementById('tips').value || 0;
            const g = +document.getElementById('get').value || 0;
            const total = p + t;
            document.getElementById('change').innerText = (g > total ? g - total : 0) + ' ₽';
        };

        window.save = async () => {
            const q = +document.getElementById('qty').value, 
                  p = +document.getElementById('price').value,
                  t = +document.getElementById('tips').value || 0;
            if (!q || !p) return;
            saveBtn.disabled = true;
            await db.collection("sales").add({ 
                q, p, t: payType, tips: t,
                dt: firebase.firestore.FieldValue.serverTimestamp() 
            });
            document.getElementById('qty').value = ''; 
            document.getElementById('price').value = '';
            document.getElementById('tips').value = '';
            saveBtn.disabled = false;
        };

        window.logE = async (s) => {
            const c = prompt(s + ": Комментарий?");
            if (c !== null) await db.collection("logs").add({ s, c: c || "Ок", dt: firebase.firestore.FieldValue.serverTimestamp() });
        };

        db.collection("sales").orderBy("dt", "desc").onSnapshot(snap => {
            let tQ = 0, tM = 0, tT = 0, html = "", count = 0;
            snap.forEach(doc => {
                const d = doc.data(); 
                tQ += d.q || 0; 
                tM += d.p || 0;
                tT += d.tips || 0;
                if (count < 5) {
                    let teaText = d.tips ? `<span class="tea-label">+${d.tips} чай</span>` : "";
                    html += `<div class="item ${d.t==='cash'?'cash':''}"><span>${d.q} шт — <b>${d.p} ₽</b>${teaText}</span><small>${d.t==='cash'?'НАЛ':'КАРТ'}</small></div>`;
                    count++;
                }
            });
            document.getElementById('list').innerHTML = html;
            document.getElementById('stQ').innerText = tQ;
            document.getElementById('stM').innerText = tM.toLocaleString() + " ₽";
            document.getElementById('stT').innerText = tT.toLocaleString() + " ₽";
        });

        db.collection("logs").orderBy("dt", "desc").limit(5).onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div style="font-size:11px; color:#64748b; margin-bottom:5px">📍 ${d.s}: ${d.c}</div>`;
            });
            document.getElementById('lList').innerHTML = html;
        });

        window.exportExcel = async () => {
            if (typeof XLSX === 'undefined') { alert("Excel библиотека не загружена"); return; }
            const snap = await db.collection("sales").get();
            let totalQ = 0, totalP = 0, totalTips = 0;
            const data = snap.docs.map(doc => {
                const d = doc.data(); 
                totalQ += d.q || 0; 
                totalP += d.p || 0;
                totalTips += d.tips || 0;
                return { 
                    "Дата": d.dt?.toDate().toLocaleString() || "-", 
                    "Кол-во": d.q, 
                    "Сумма": d.p, 
                    "Чаевые": d.tips || 0,
                    "Тип": d.t 
                };
            });
            data.push({}); 
            data.push({ "Дата": "ИТОГО:", "Кол-во": totalQ, "Сумма": totalP, "Чаевые": totalTips });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sales");
            XLSX.writeFile(wb, "Flow_Report.xlsx");
        };
    </script>
</body>
</html>
