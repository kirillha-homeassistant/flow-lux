<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW LUX</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root { --p: #f472b6; --bg: #0f172a; --card: #1e293b; --tea: #10b981; --err: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding: 15px; min-height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(30,41,59,0.5); padding: 15px; border-radius: 20px; }
        h1 { font-size: 18px; color: var(--p); font-weight: 900; }
        nav { display: flex; gap: 8px; }
        nav button { background: none; border: none; color: #94a3b8; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        nav button.active { color: var(--p); border-bottom: 2px solid var(--p); }

        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        input { background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 12px; color: #fff; font-size: 16px; width: 100%; outline: none; margin-bottom: 10px; }
        input:focus { border-color: var(--p); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pay-btn { background: #334155; border: none; padding: 12px; border-radius: 12px; color: #94a3b8; font-weight: 800; font-size: 10px; }
        .pay-btn.active { background: var(--p); color: #fff; }
        
        .main-btn { width: 100%; background: linear-gradient(135deg, #ec4899, #be185d); border: none; padding: 16px; border-radius: 14px; color: #fff; font-weight: 900; text-transform: uppercase; font-size: 13px; }
        
        .item { background: rgba(30,41,59,0.4); padding: 10px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #334155; font-size: 14px; }
        .item.cash { border-left-color: var(--tea); }
        
        .diff-box { margin-top: 10px; padding: 10px; border-radius: 10px; text-align: center; font-weight: 800; }
        .diff-ok { background: rgba(16, 185, 129, 0.1); color: var(--tea); }
        .diff-bad { background: rgba(239, 68, 68, 0.1); color: var(--err); }
        
        .hidden { display: none !important; }
        .small-txt { font-size: 10px; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>FLOW LUX</h1>
        <nav>
            <button onclick="tab('in')" id="t-in" class="active">Касса</button>
            <button onclick="tab('st')" id="t-st">Сверка</button>
        </nav>
    </header>

    <main id="s-in">
        <div class="card">
            <div class="grid">
                <input type="number" id="qty" placeholder="Кол-во">
                <input type="number" id="price" placeholder="Сумма ₽">
            </div>
            <input type="number" id="tips" style="border-color: var(--tea)" placeholder="+ Чаевые ₽">
            <div class="grid" style="margin-bottom: 10px;">
                <button onclick="setPay('card')" id="p-card" class="pay-btn active">КАРТА</button>
                <button onclick="setPay('cash')" id="p-cash" class="pay-btn">НАЛИЧКА</button>
            </div>
            <button onclick="save()" id="btn-save" class="main-btn">ЗАПИСАТЬ</button>
        </div>
        <div id="list"></div>
    </main>

    <main id="s-st" class="hidden">
        <div class="card">
            <span class="small-txt">Факт в наличии (введи ручками)</span>
            <div class="grid">
                <input type="number" id="factCash" oninput="checkDiff()" placeholder="Нал в кассе">
                <input type="number" id="factCard" oninput="checkDiff()" placeholder="По терминалу">
            </div>
            
            <span class="small-txt">Вычесть (расход / прошлые дни)</span>
            <input type="number" id="minus" oninput="checkDiff()" placeholder="Сумма к вычету ₽" style="border-color: var(--err)">

            <div id="diffDisplay" class="diff-box diff-ok">Введите данные для сверки</div>
        </div>

        <div class="card">
            <div class="grid" style="text-align: center;">
                <div><small class="small-txt">Продажи (чистые)</small><b id="stM" style="font-size: 18px;">0 ₽</b></div>
                <div><small class="small-txt">Чаевые</small><b id="stT" style="color:var(--tea); font-size: 18px;">0 ₽</b></div>
            </div>
            <hr style="opacity: 0.1; margin: 10px 0;">
            <div style="text-align: center;">
                <small class="small-txt">Общий итог (с чаем)</small>
                <b id="stTotal" style="font-size: 22px; color: var(--p);">0 ₽</b>
            </div>
        </div>

        <button onclick="exportExcel()" class="main-btn" style="background: #059669;">💾 СКАЧАТЬ EXCEL</button>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyAcZmlPf71oKnxyJQ8k2xhjJJXHtPrWktY",
            authDomain: "sales-flower-d7cb0.firebaseapp.com",
            projectId: "sales-flower-d7cb0",
            storageBucket: "sales-flower-d7cb0.firebasestorage.app",
            messagingSenderId: "611059680149",
            appId: "1:611059680149:web:a53f77fb73b6cf10242c9c"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let payType = 'card', dbSales = 0, dbTips = 0, dbCash = 0, dbCard = 0;

        window.tab = (t) => {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('s-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('active');
        };

        window.setPay = (t) => {
            payType = t;
            document.getElementById('p-card').classList.toggle('active', t === 'card');
            document.getElementById('p-cash').classList.toggle('active', t === 'cash');
        };

        window.save = async () => {
            const q = +document.getElementById('qty').value, p = +document.getElementById('price').value, t = +document.getElementById('tips').value || 0;
            if (!q || !p) return;
            await db.collection("sales").add({ q, p, t: payType, tips: t, dt: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('qty').value = ''; document.getElementById('price').value = ''; document.getElementById('tips').value = '';
        };

        // Слушатель данных
        db.collection("sales").orderBy("dt", "desc").onSnapshot(snap => {
            dbSales = 0; dbTips = 0; dbCash = 0; dbCard = 0;
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                dbSales += d.p; dbTips += d.tips;
                if(d.t === 'cash') dbCash += (d.p + d.tips); else dbCard += (d.p + d.tips);
                html += `<div class="item ${d.t==='cash'?'cash':''}"><span>${d.q} шт — <b>${d.p} ₽</b></span><small>${d.t==='cash'?'НАЛ':'КАРТ'}</small></div>`;
            });
            document.getElementById('list').innerHTML = html;
            document.getElementById('stM').innerText = dbSales + " ₽";
            document.getElementById('stT').innerText = dbTips + " ₽";
            document.getElementById('stTotal').innerText = (dbSales + dbTips) + " ₽";
            checkDiff();
        });

        window.checkDiff = () => {
            const fCash = +document.getElementById('factCash').value || 0;
            const fCard = +document.getElementById('factCard').value || 0;
            const minus = +document.getElementById('minus').value || 0;
            
            const totalFact = fCash + fCard;
            const totalDb = (dbSales + dbTips) - minus;
            const diff = totalFact - totalDb;

            const display = document.getElementById('diffDisplay');
            if (fCash === 0 && fCard === 0) {
                display.innerText = "Введите данные для сверки";
                display.className = "diff-box";
                return;
            }

            if (diff === 0) {
                display.innerText = "ВСЁ СХОДИТСЯ! ✅";
                display.className = "diff-box diff-ok";
            } else {
                display.innerText = (diff > 0 ? "ИЗЛИШЕК: +" : "НЕДОСТАЧА: ") + diff + " ₽";
                display.className = "diff-box diff-bad";
            }
        };

        window.exportExcel = async () => {
            const snap = await db.collection("sales").get();
            const minus = +document.getElementById('minus').value || 0;
            let totalP = 0, totalT = 0;
            const data = snap.docs.map(doc => {
                const d = doc.data(); totalP += d.p; totalT += d.tips;
                return { "Дата": d.dt?.toDate().toLocaleString() || "-", "Сумма": d.p, "Чай": d.tips, "Тип": d.t };
            });
            data.push({});
            data.push({ "Дата": "ВЫЧЕТ (ПРОШЛЫЕ ДНИ):", "Сумма": -minus });
            data.push({ "Дата": "ИТОГО ЧИСТЫМИ:", "Сумма": totalP - minus });
            data.push({ "Дата": "ИТОГО С ЧАЕМ:", "Сумма": (totalP + totalT) - minus });
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, "Flow_Final_Report.xlsx");
        };
    </script>
</body>
</html>
